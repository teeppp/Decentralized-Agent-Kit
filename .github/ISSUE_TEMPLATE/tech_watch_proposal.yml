name: 新技術ウォッチ提案 (Tech-watch proposal)
description: 憲章に沿った新ライブラリ・仕様・手法の採用提案（多くは自動起票されます）
labels: ["tech-watch"]
body:
  - type: input
    id: subject
    attributes:
      label: 対象 / Subject
      placeholder: "例: 新しいA2A拡張仕様 xxx / ライブラリ yyy"
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: 参照リンク / Reference
      placeholder: "リポジトリ・仕様・リリースノートのURL"
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: 憲章適合度 / Fit against CHARTER.md
      description: docs/CHARTER.md のどのドメイン・原則に貢献するか、採用基準を満たすか。
    validations:
      required: true
  - type: textarea
    id: sketch
    attributes:
      label: 導入スケッチ / Integration sketch
      description: どのコンポーネントに、どう入れるか。既存の何を置き換える/補完するか。
    validations:
      required: false
  - type: dropdown
    id: effort
    attributes:
      label: 見積り規模 / Effort
      options:
        - spike (調査のみ)
        - small
        - medium
        - large
    validations:
      required: false
