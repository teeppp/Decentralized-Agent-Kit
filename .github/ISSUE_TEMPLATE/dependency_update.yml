name: 依存更新の追跡 (Dependency update)
description: 依存ライブラリの脆弱性・更新の追跡（多くは自動起票されます）
labels: ["deps"]
body:
  - type: input
    id: dependency
    attributes:
      label: 依存パッケージ / Dependency
      placeholder: "例: litellm"
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: バージョン / from -> to
      placeholder: "例: 1.51.0 -> 1.52.3"
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: 種別 / Kind
      options:
        - security (脆弱性)
        - version (通常更新)
        - feature-sync (新機能取り込み)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 対象コンポーネント / Component
      multiple: true
      options:
        - agent
        - mcp-server
        - bff
        - cli
        - tests/integration
        - github-actions
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: リスク判定メモ / Risk notes
      description: semver bump、破壊的変更の有無、changelog 要約、トリアージ結果など。
    validations:
      required: false
