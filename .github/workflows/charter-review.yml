name: Charter review

# 四半期: 目的憲章(docs/CHARTER.md)そのものを見直す Issue を起票（要件4の「目的の定期見直し」）。
# provider 中立（MAINT_LLM_*）+ Web 検索（任意 TAVILY_API_KEY）。
# MAINT_LLM_* 未設定なら 0 件（失敗しない）。
on:
  schedule:
    - cron: "0 7 1 1,4,7,10 *" # 1/4/7/10 月の 1 日 07:00 UTC（四半期）
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  charter-review:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAINT_LLM_BASE_URL: ${{ vars.MAINT_LLM_BASE_URL }}
      MAINT_LLM_MODEL: ${{ vars.MAINT_LLM_MODEL }}
      MAINT_LLM_API_KEY: ${{ secrets.MAINT_LLM_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "maintenance/uv.lock"

      - name: Generate charter-review issue
        working-directory: maintenance
        run: |
          uv sync
          quarter="$(date -u +%Y)-Q$((($(date -u +%-m)-1)/3+1))"
          existing=$(gh issue list --label charter --state open --json title --jq '[.[].title]')
          uv run dak-maint charter-review \
            --charter ../docs/CHARTER.md \
            --quarter "$quarter" \
            --existing-titles "$existing" > proposals.json
          cat proposals.json

      - name: Create issue
        working-directory: maintenance
        run: |
          python3 - <<'PY'
          import json, subprocess
          for p in json.load(open("proposals.json")):
              subprocess.run(
                  ["gh", "issue", "create", "--title", p["title"],
                   "--body", p["body"], "--label", ",".join(p["labels"])],
                  check=True,
              )
          PY
