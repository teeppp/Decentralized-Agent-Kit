name: Nightly eval

# 夜間: CPU ランナー上で小型 Ollama モデルを起動し、ゲート済みの実LLMスモークを
# 寛容なアサーションで実行する。継続的な「実モデル」品質シグナル（要件6）。
# PR ゲートではないので continue-on-error で、落ちても情報として記録する。
on:
  schedule:
    - cron: "0 3 * * *" # 毎日 03:00 UTC
  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model (LiteLLM format is added automatically)"
        default: "llama3.2:3b"

permissions:
  contents: write # history.jsonl 追記コミット用（main が保護されている場合は soft fail）

env:
  MODEL: ${{ github.event.inputs.model || 'llama3.2:3b' }}

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ env.MODEL }}

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/version && break || sleep 1; done
          ollama pull "$MODEL"

      - uses: astral-sh/setup-uv@v5

      - name: Start stack against host Ollama
        env:
          LOCAL_MODEL_NAME: ollama_chat/${{ env.MODEL }}
        run: |
          touch .env
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.local-llm.yml \
            up -d --build --wait

      - name: Run gated real-LLM smoke (tolerant)
        id: smoke
        continue-on-error: true
        working-directory: tests/integration
        env:
          DAK_SMOKE_REAL_LLM: "1"
        run: |
          uv sync
          uv run pytest -q test_smoke_real_llm.py --junitxml=eval-report.xml

      - name: Summarize and append history
        if: always()
        run: |
          python3 - <<'PY'
          import datetime, json, os, xml.etree.ElementTree as ET
          path = "tests/integration/eval-report.xml"
          total = failures = errors = skipped = 0
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              suites = root.findall("testsuite") or [root]
              for s in suites:
                  total += int(s.get("tests", 0)); failures += int(s.get("failures", 0))
                  errors += int(s.get("errors", 0)); skipped += int(s.get("skipped", 0))
          passed = total - failures - errors - skipped
          rate = round(passed / total, 3) if total else 0.0
          rec = {
              "date": datetime.date.today().isoformat(),
              "model": os.environ["MODEL"],
              "total": total, "passed": passed, "failed": failures + errors,
              "skipped": skipped, "pass_rate": rate,
          }
          os.makedirs("docs/eval", exist_ok=True)
          with open("docs/eval/history.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(rec) + "\n")
          summary = f"### Nightly eval ({rec['model']})\n\n- pass_rate: **{rate}** ({passed}/{total}, skipped {skipped})\n"
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write(summary)
          print(summary)
          PY

      - name: Commit history (soft-fail if main protected)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/eval/history.jsonl
          git commit -m "chore(eval): nightly pass-rate [skip ci]" || echo "nothing to commit"
          git push || echo "push failed (protected branch?) — artifact に残ります"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-eval
          path: |
            tests/integration/eval-report.xml
            docs/eval/history.jsonl
            ollama.log

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.local-llm.yml down -v
