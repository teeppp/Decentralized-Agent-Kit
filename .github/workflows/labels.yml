name: Sync labels

# .github/labels.yml を唯一の真実として、リポジトリのラベルを同期する。
on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crazy-max/ghaction-github-labeler@v6
        with:
          yaml-file: .github/labels.yml
          # dry-run: PR段階の確認用。main では実際に反映する。
          dry-run: ${{ github.event_name == 'pull_request' }}
          # 既存の想定外ラベルは消さない（安全側）。不要なら true に。
          skip-delete: true
