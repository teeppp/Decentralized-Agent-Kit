name: Dependency triage

# Dependabot PR を判定し、安全なものは自動マージを有効化、そうでなければ
# needs-human-review ラベル + リスク要約コメントを付ける（要件2）。
#
# セキュリティ設計:
#   - pull_request_target なので base ブランチのコード（= 信頼できる maintenance/）を
#     チェックアウトして実行する。PR の（信頼できない）コードは実行しない。
#   - Dependabot イベントの秘密情報は "Dependabot secrets" ストアから供給される
#     （通常の Actions secrets とは別。docs/maintenance/README.md 参照）。
#   - 実際のマージは `gh pr merge --auto` が担い、branch protection の必須チェック
#     （CI）が green になるまで GitHub 側が保留する。ここでは可否だけ決める。
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  triage:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base (trusted) code
        uses: actions/checkout@v7

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "maintenance/uv.lock"

      - name: Run triage engine
        id: triage
        working-directory: maintenance
        env:
          # Tier1 LLM（任意）。未設定ならヒューリスティック判定にフォールバック。
          MAINT_LLM_BASE_URL: ${{ vars.MAINT_LLM_BASE_URL }}
          MAINT_LLM_MODEL: ${{ vars.MAINT_LLM_MODEL }}
          MAINT_LLM_API_KEY: ${{ secrets.MAINT_LLM_API_KEY }}
        run: |
          uv sync
          uv run dak-maint triage \
            --package "${{ steps.meta.outputs.dependency-names }}" \
            --from "${{ steps.meta.outputs.previous-version }}" \
            --to "${{ steps.meta.outputs.new-version }}" \
            --ci-passed true \
            --fetch-changelog \
            --assessor "${{ vars.MAINT_ASSESSOR || 'heuristic' }}"

      - name: Apply decision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ACTION: ${{ steps.triage.outputs.action }}
          LABELS: ${{ steps.triage.outputs.labels }}
          REASON: ${{ steps.triage.outputs.reason }}
          RISK: ${{ steps.triage.outputs.risk }}
          BUMP: ${{ steps.triage.outputs.bump }}
        run: |
          set -euo pipefail
          [ -n "$LABELS" ] && gh pr edit "$PR_URL" --add-label "$LABELS" || true
          if [ "$ACTION" = "auto-merge" ]; then
            echo "自動マージを有効化（CI green を GitHub が待機）"
            gh pr merge --auto --squash "$PR_URL"
            gh pr comment "$PR_URL" --body "🤖 自動トリアージ: **auto-merge** を有効化 (bump=$BUMP, risk=$RISK)。必須チェックが green になり次第マージされます。理由: $REASON"
          else
            echo "人間レビューを要求"
            gh pr comment "$PR_URL" --body "🤖 自動トリアージ: **人間レビューが必要** (bump=$BUMP, risk=$RISK)。理由: $REASON"
          fi
