name: Feature sync

# 週次: 最近更新された依存の release notes から「新機能」を抽出し取り込み Issue を起票（要件3）。
# provider 中立（MAINT_LLM_*）。changelog は決定論取得なので Web 検索不要。
# MAINT_LLM_* 未設定なら提案 0 件（失敗しない）。
on:
  schedule:
    - cron: "0 6 * * 1" # 毎週月曜 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  feature-sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAINT_LLM_BASE_URL: ${{ vars.MAINT_LLM_BASE_URL }}
      MAINT_LLM_MODEL: ${{ vars.MAINT_LLM_MODEL }}
      MAINT_LLM_API_KEY: ${{ secrets.MAINT_LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "maintenance/uv.lock"

      - name: Collect recently updated deps
        working-directory: maintenance
        run: |
          # Dependabot の既定コミット件名 "Bump <pkg> from <a> to <b>" を解析。
          git log --since="2 weeks ago" --pretty=%s | python3 - <<'PY' > deps.json
          import json, re, sys
          deps, seen = [], set()
          for line in sys.stdin:
              m = re.search(r"[Bb]ump (\S+) from (\S+) to (\S+)", line)
              if m and m.group(1) not in seen:
                  seen.add(m.group(1))
                  deps.append({"package": m.group(1), "from": m.group(2), "to": m.group(3)})
          json.dump(deps[:10], sys.stdout)
          PY
          cat deps.json

      - name: Generate proposals
        working-directory: maintenance
        run: |
          uv sync
          existing=$(gh issue list --label feature-sync --state open --json title --jq '[.[].title]')
          uv run dak-maint feature-sync \
            --deps "$(cat deps.json)" \
            --charter ../docs/CHARTER.md \
            --existing-titles "$existing" \
            --max-items 2 > proposals.json
          cat proposals.json

      - name: Create issues
        working-directory: maintenance
        run: |
          python3 - <<'PY'
          import json, subprocess
          for p in json.load(open("proposals.json")):
              subprocess.run(
                  ["gh", "issue", "create", "--title", p["title"],
                   "--body", p["body"], "--label", ",".join(p["labels"])],
                  check=True,
              )
          PY
