# Dependabot 設定。5 つの uv プロジェクト + GitHub Actions を対象。
# minor/patch は per-component でグルーピングし PR 数を抑える。
# 生成された PR は dependency-triage ワークフローが判定し、安全なものは自動マージ。
version: 2

updates:
  # ---- Python (uv) 各コンポーネント ----
  - package-ecosystem: "uv"
    directory: "/agent"
    schedule: { interval: "weekly" }
    labels: ["deps", "area:agent"]
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(agent)" }
    groups:
      agent-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "uv"
    directory: "/mcp-server"
    schedule: { interval: "weekly" }
    labels: ["deps", "area:mcp"]
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(mcp-server)" }
    groups:
      mcp-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "uv"
    directory: "/bff"
    schedule: { interval: "weekly" }
    labels: ["deps", "area:bff"]
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(bff)" }
    groups:
      bff-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "uv"
    directory: "/cli"
    schedule: { interval: "weekly" }
    labels: ["deps", "area:cli"]
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(cli)" }
    groups:
      cli-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "uv"
    directory: "/tests/integration"
    schedule: { interval: "weekly" }
    labels: ["deps"]
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(itest)" }
    groups:
      itest-minor-patch:
        update-types: ["minor", "patch"]

  # ---- GitHub Actions ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["deps", "automation"]
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(actions)" }
    groups:
      actions-all:
        patterns: ["*"]
